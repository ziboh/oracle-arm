services:
  oracle-arm:
    # Prefer the published GHCR image, or build from this repo with --build.
    # Override version: ORACLE_ARM_IMAGE=ghcr.io/ziboh/oracle-arm:1.1.0 docker compose up -d
    image: ${ORACLE_ARM_IMAGE:-ghcr.io/ziboh/oracle-arm:latest}
    build: .
    container_name: oracle-arm-console
    restart: unless-stopped
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:8080:8080"
    environment:
      WEB_PASSWORD: ${WEB_PASSWORD:-admin}
      WEB_SECRET_KEY: ${WEB_SECRET_KEY:-}
      WEB_THREADS: ${WEB_THREADS:-4}
      WEB_SECURE_COOKIE: ${WEB_SECURE_COOKIE:-false}
      OCI_PROFILE: ${OCI_PROFILE:-DEFAULT}
      RETRY_INTERVAL: ${RETRY_INTERVAL:-10}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TELEGRAM_API_HOST: ${TELEGRAM_API_HOST:-api.telegram.org}
      BARK_ENABLED: ${BARK_ENABLED:-false}
      BARK_SERVER: ${BARK_SERVER:-https://api.day.app}
      BARK_DEVICE_KEY: ${BARK_DEVICE_KEY:-}
      WEBHOOK_ENABLED: ${WEBHOOK_ENABLED:-false}
      WEBHOOK_PROVIDER: ${WEBHOOK_PROVIDER:-generic}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST:-smtp.example.com}
      EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-587}
      EMAIL_SECURITY: ${EMAIL_SECURITY:-starttls}
      EMAIL_USERNAME: ${EMAIL_USERNAME:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_TO: ${EMAIL_TO:-}
    volumes:
      - oracle-arm-data:/data
      # JobManager writes task state relative to /app, so keep it on the
      # same persistent volume as the configured /data directory.
      - oracle-arm-data:/app/data

volumes:
  oracle-arm-data:
