services:
  oracle-arm:
    # Use the published GHCR image. Override version via ORACLE_ARM_IMAGE.
    # e.g. ORACLE_ARM_IMAGE=ghcr.io/ziboh/oracle-arm:1.2.0 docker compose up -d
    image: ${ORACLE_ARM_IMAGE:-ghcr.io/ziboh/oracle-arm:1.2.0}
    container_name: oracle-arm-console
    restart: unless-stopped
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:8080:8080"
    environment:
      WEB_SECURE_COOKIE: ${WEB_SECURE_COOKIE:-false}
    volumes:
      - oracle-arm-data:/data
      # JobManager writes task state relative to /app, so keep it on the
      # same persistent volume as the configured /data directory.
      - oracle-arm-data:/app/data

volumes:
  oracle-arm-data:
